    value: 'Vastuupalvelusi on vanhentunut Palvelumanuaalissa: [message:field_node:entity:title]'
    format: plain_text_format
  -
    value: '<p>Palvelukuvaus on vanhentunut automaattisesti, koska palveluntuottaja ei ole päivittänyt sen tietoja neljään kuukauteen. Palvelu ei ole enää julkisesti nähtävissä Palvelumanuaali-sivustolla. Jos kuvauksella on käännösversioita, myös ne ovat vanhentuneet ja poistuneet näkyvistä.&nbsp;</p><p>Palvelu ja sen mahdolliset käännösversiot säilyvät "Vanhentunut"-tilassa kahden kuukauden ajan. Tänä aikana sinun on mahdollista julkaista ne uudestaan. Siirry palvelukuvaukseen alla olevasta linkistä.</p><p><a href="[message:field_node:entity:url]">[message:field_node:entity:title]</a><br>Huom! Linkki toimii vain sisäänkirjautuneille käyttäjille.</p><p>Palveluntuottajan vastuupäivittäjä:</p><p>1. Jos haluat julkaista palvelun uudelleen, käy tarkistamassa tietojen ajantasaisuus ja paina "Valmis julkaistavaksi".</p><p>Kunnan vastuupäivittäjä:</p><p>1. Jos kyseessä on ulkoisen palveluntuottajan palvelu, voit tarvittaessa kysyä palvelun tilanteesta palveluntuottajan vastuupäivittäjältä [message:field_message_author:entity:mail].</p><p>2. Jos kyseessä on kunnan hallinnoima palvelu ja haluat julkaista palvelun uudelleen, käy tarkistamassa tietojen ajantasaisuus ja paina ensin "Valmis julkaistavaksi". Paina tämän jälkeen "Julkaise".</p><p>Jos palvelua ei julkaista uudestaan, se arkistoituu kahden kuukauden kuluttua. Arkistoidun palvelun voi palauttaa vain sivuston ylläpito.</p><p>Tämä ilmoitus on automaattinen.</p><p>Ystävällisin terveisin<br>Palvelumanuaalin ylläpito</p>'
    format: email_html
