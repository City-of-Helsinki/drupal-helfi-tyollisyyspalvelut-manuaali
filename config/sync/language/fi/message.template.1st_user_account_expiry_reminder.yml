    value: 'Käyttäjätilisi sulkeutuu Palvelumanuaalissa'
    format: plain_text_format
  -
    value: '<p>Et ole kirjautunut sisään Palvelumanuaaliin yli viiteen kuukauteen. Käyttäjätilisi sulkeutuu kahden viikon kuluttua, jos et käytä palvelua.</p><p><a href="[site:login-url]">Estä käyttäjätilin sulkeutuminen kirjautumalla sisään &gt;</a></p><p>Jos et enää käytä palvelua, voit jättää tämän viestin huomioimatta ja tilisi sulkeutuu automaattisesti kahden viikon kuluttua. Henkilötietosi poistetaan palvelusta pysyvästi 30 päivää tilin sulkeutumisen jälkeen.</p>'
    format: email_html
