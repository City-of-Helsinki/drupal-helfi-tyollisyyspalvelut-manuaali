text:
  -
    value: "Käyttäjätilisi on suljettu Palvelumanuaalissa\r\n"
    format: plain_text_format
  -
    value: '<p>Käyttäjätilisi Palvelumanuaalissa on suljettu. Käyttäjätili on mahdollista palauttaa 30 päivän ajan. Jos tarvitset vielä käyttäjätiliäsi, ota yhteyttä oman organisaatiosi pääkäyttäjään tai Palvelumanuaalin ylläpitoon osoitteessa <a href="mailto:[site:mail]">[site:mail]</a>.</p><p>Jos et enää käytä palvelua, voit jättää tämän viestin huomioimatta. Henkilötietosi poistetaan palvelusta pysyvästi 30 päivää tilin sulkeutumisen jälkeen.</p>'
    format: email_html
