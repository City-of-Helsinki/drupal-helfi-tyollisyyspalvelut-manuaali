text:
  -
    value: 'Vastuupalvelusi odottaa julkaisua Palvelumanuaalissa: [message:field_node:entity:title]'
    format: plain_text_format
  -
    value: '<p>Palveluntuottaja on merkinnyt palvelukuvauksen julkaisuvalmiiksi. Näin julkaiset palvelun:</p><p>1. Lue palvelun julkiset tiedot läpi. Tarkista, että tiedot ovat oikein ja palvelu on <a href="https://tyollisyys.palvelumanuaali.fi/palveluntuottajalle/palvelulinjaukset">linjausten</a> mukainen. Pääset tarkastelemaan kuvauksen julkaisematonta, uusinta versiota alla olevan linkin kautta.</p><p><a href="[message:field_node:entity:latest-revision-url]">[message:field_node:entity:title]</a><br> Huom! Linkki toimii vain sisäänkirjautuneille käyttäjille.</p><p>2. Jos palvelukuvaus on kokonaan uusi: kirjoita palvelulle sisäiset työohjeet.</p><p>3. Jos vanhaan palvelukuvaukseen on tehty muutoksia: tarkista, vaikuttavatko muutokset sisäisiin työohjeisiin ja päivitä ne tarvittaessa.</p><p>4. Kun julkiset tiedot ja työohjeet on tarkistettu, paina "Julkaise".</p><p>5. Jos palvelun julkisissa tiedoissa on epäselvyyttä, ole yhteydessä palveluntuottajan vastuupäivittäjään [message:field_message_author:entity:mail].</p><p>Tämä ilmoitus on automaattinen.</p><p>Ystävällisin terveisin<br>Palvelumanuaalin ylläpito</p>'
    format: email_html
