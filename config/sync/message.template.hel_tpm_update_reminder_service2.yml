description: '2nd service update reminder'
text:
  -
    value: 'Tarkista vastuupalvelusi tiedot Palvelumanuaalissa: [message:field_node:entity:title]'
    format: plain_text_format
  -
    value: '<p>Palvelumanuaalin palvelukuvausten tiedot tulee tarkistaa neljän kuukauden välein. Palvelukuvaus vanhenee automaattisesti kahden viikon kuluttua tästä ilmoituksesta, jos et vahvista tietojen ajantasaisuutta.</p><p>Näin estät automaattisen vanhenemisen:</p><p>1. Lue palvelun tiedot läpi ja tarkista niiden ajantasaisuus painamalla alla olevaa linkkiä.</p><p><a href="[message:field_node:entity:url]">[message:field_node:entity:title]</a></p><p>2. Jos kuvauksessa on vanhentuneita tietoja, tee tarvittavat muutokset ja paina "Valmis julkaistavaksi" tai kunnan käyttäjänä suoraan “Julkaise”.</p><p>3. Jos kuvauksessa ei ole muutostarpeita, paina suoraan “Valmis julkaistavaksi” tai kunnan käyttäjänä "Julkaise".</p><p>4. Jos palvelua ei enää järjestetä, siirrä palvelukuvaus "Vanhentunut"-tilaan.</p><p>Tämä ilmoitus on automaattinen.</p><p>Ystävällisin terveisin<br>Palvelumanuaalin ylläpito</p>'
    format: email_html
settings:
  'token options':
    clear: false
    'token replace': true
  purge_override: false
  purge_methods: {  }
