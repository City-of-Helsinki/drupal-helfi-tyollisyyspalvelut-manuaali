hel_tpm_url_shortener.settings_form:
  path: '/admin/config/system/hel-tpm-url-shortener'
  defaults:
    _title: 'Hel TPM Url shortener settings'
    _form: 'Drupal\hel_tpm_url_shortener\Form\SettingsForm'
  requirements:
    _permission: 'administer hel_tpm_url_shortener configuration'
hel_tpm_url_shortener.shortener_ajax:
  path: '/hel_tpm_url_shortener/ajax/url-shortener'
  defaults:
    _controller: 'Drupal\hel_tpm_url_shortener\Controller\ShortUrlAjaxController::createShortUrl'
  requirements:
    _role: 'authenticated'
